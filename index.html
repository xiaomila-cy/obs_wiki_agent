<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小米辣的个人知识库</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#f59e0b;--accent2:#38bdf8;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.header a{color:var(--accent2);text-decoration:none;font-size:.85rem}
.header h1{font-size:1.15rem;color:var(--accent);flex:1;margin:0}
.container{max-width:1100px;margin:0 auto;padding:1.2rem}
.sub-section{margin-bottom:1.8rem}
.sub-heading{font-size:.95rem;font-weight:600;margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:.3rem}
.sub-count{font-weight:400;color:var(--muted);font-size:.76rem}
.sub-desc{font-size:.72rem;color:var(--muted);margin-bottom:.5rem}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
@media(max-width:1024px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem}
.card:hover{border-color:var(--accent2);cursor:pointer}
.card-title{font-weight:600;font-size:.88rem}
.card-meta{font-size:.7rem;color:var(--muted);margin-top:.15rem}
.card-tags{margin-top:.25rem}
.tag{display:inline-block;padding:.1em .45em;border-radius:4px;font-size:.66rem;background:#1e3a5f;color:#7dd3fc;margin:.1rem}
.badge{padding:.1em .4em;border-radius:4px;font-size:.65rem;font-weight:600}
.b-entity{background:#1e3a5f;color:#7dd3fc}.b-concept{background:#14532d;color:#86efac}
.md-view{line-height:1.8;padding-bottom:2rem}
.md-view h1{font-size:1.25rem;margin:1rem 0}.md-view h2{font-size:1.05rem;margin:1.2rem 0 .4rem;border-bottom:1px solid var(--border);padding-bottom:.2rem}
.md-view h3{font-size:.95rem;margin:.8rem 0 .3rem}
.md-view p{margin:.5rem 0}.md-view ul,.md-view ol{margin:.4rem 0;padding-left:1.5rem}.md-view li{margin:.2rem 0}
.md-view code{background:var(--border);padding:.12em .35em;border-radius:3px;font-size:.83em}
.md-view pre{background:#0f172a;padding:.8rem;border-radius:6px;overflow-x:auto;margin:.8rem 0;border:1px solid var(--border);font-size:.8rem}
.md-view blockquote{border-left:3px solid var(--accent2);padding:.3rem .8rem;margin:.6rem 0;color:var(--muted)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}.empty h3{font-size:1rem;color:var(--text)}
@media(max-width:768px){.header{padding:.7rem}.container{padding:.7rem}}
</style>
</head>
<body>

<div class="header">
  <a href="dashboard.html">← 仪表盘</a>
  <h1 id="htitle">📂 浏览文档</h1>
  <a href="#" id="backBtn" style="display:none" onclick="showList()">← 返回列表</a>
</div>

<div class="container" id="content"><div class="empty"><p>加载中...</p></div></div>

<script>
var DOMAINS={
  'it-security':{emoji:'🔐',name:'IT网络与数据安全'},
  'auto-security':{emoji:'🚗',name:'智能网联汽车安全'},
  'investment':{emoji:'📈',name:'投资之路'},
  'daily':{emoji:'📝',name:'日常记录'},
  'ai-learning':{emoji:'🤖',name:'AI学习'},
  'other':{emoji:'📦',name:'其他'}
};
var TYPES={entity:'实体',concept:'概念',comparison:'对比',query:'查询'};
var allPages=[],subDomains={},currentDomain='';

async function init(){
  var p=new URLSearchParams(location.search);
  currentDomain=p.get('domain')||'';
  if(!currentDomain){location.href='dashboard.html';return}
  var d=DOMAINS[currentDomain]||{emoji:'📂',name:currentDomain};
  document.getElementById('htitle').textContent=d.emoji+' '+d.name;
  try{
    var r1=await fetch('page_list.json');allPages=await r1.json();
    try{var r2=await fetch('sub_domains.json');var sd=await r2.json();subDomains=sd.sub_domains[currentDomain]||[]}catch(e){}
  }catch(e){allPages=[]}
  showList()
}

function filterPages(){return allPages.filter(function(p){return p.domain===currentDomain})}

function showList(){
  document.getElementById('backBtn').style.display='none';
  var pages=filterPages();
  if(pages.length===0){
    document.getElementById('content').innerHTML='<div class="empty"><h3>📭 暂无文档</h3><p style="margin-top:1rem;font-size:.85rem"><a href="dashboard.html" style="color:var(--accent2)">← 返回仪表盘</a></p></div>';
    return
  }
  var groups={};
  pages.forEach(function(p){var sd=p.sub_domain||'other';if(!groups[sd])groups[sd]=[];groups[sd].push(p)});
  var html='<div style="font-size:.82rem;color:var(--muted);margin-bottom:1rem">共 <strong>'+pages.length+'</strong> 篇，分 '+Object.keys(groups).length+' 个板块</div>';
  
  var order=subDomains.map(function(s){return s.id});
  if(order.indexOf('other')<0)order.push('other');
  Object.keys(groups).forEach(function(k){if(order.indexOf(k)<0)order.push(k)});

  order.forEach(function(sdId){
    if(!groups[sdId])return;
    var info=null;
    subDomains.forEach(function(s){if(s.id===sdId)info=s});
    var name=info?info.emoji+' '+info.name:sdId;
    html+='<div class="sub-section">';
    html+='<div class="sub-heading">'+name+'<span class="sub-count">'+groups[sdId].length+' 篇</span></div>';
    if(info&&info.desc)html+='<div class="sub-desc">'+info.desc+'</div>';
    html+='<div class="card-grid">';
    groups[sdId].forEach(function(p){
      html+='<div class="card" onclick="viewPage(\''+p.path+'\',\''+p.title.replace(/'/g,"\\'")+'\')">'+
        '<div class="card-title">'+p.title+'</div>'+
        '<div class="card-meta"><span class="badge b-'+p.type+'">'+TYPES[p.type]+'</span> · '+p.updated+'</div>'+
        '<div class="card-tags">'+(p.tags||[]).slice(0,4).map(function(t){return '<span class="tag">'+t+'</span>'}).join('')+'</div>'+
      '</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html
}

async function viewPage(path,title){
  document.getElementById('htitle').textContent=title;
  document.getElementById('backBtn').style.display='inline';
  document.getElementById('content').innerHTML='<div class="empty"><p>加载中...</p></div>';
  try{
    var r=await fetch(path);var md=await r.text();
    md=md.replace(/^---[\s\S]*?---\n*/,'');
    md=md.replace(/\[\[([^\]]+)\]\]/g,'$1');
    var h=md.split('\n').map(function(l){
      l=l.trim();if(!l)return'';
      if(l.startsWith('# '))return'<h1>'+l.slice(2)+'</h1>';
      if(l.startsWith('## '))return'<h2>'+l.slice(3)+'</h2>';
      if(l.startsWith('### '))return'<h3>'+l.slice(4)+'</h3>';
      if(l.startsWith('- '))return'<li>'+l.slice(2)+'</li>';
      if(l.startsWith('> '))return'<blockquote>'+l.slice(2)+'</blockquote>';
      if(l.startsWith('```'))return'';
      return'<p>'+l+'</p>'
    }).join('\n');
    h=h.replace(/<li>[\s\S]*?<\/li>/g,function(m){return'<ul>'+m+'</ul>'});
    document.getElementById('content').innerHTML='<div class="md-view">'+h+'</div>'
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty"><p>加载失败</p></div>'
  }
}

init();
</script>
</body>
</html>
