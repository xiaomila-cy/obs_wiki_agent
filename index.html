<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌶️ 小米辣 · 文档</title>
<style>
:root{--bg:#fafbfc;--surface:#fff;--text:#1a1a2e;--muted:#6b7280;--accent:#f59e0b;--blue:#3b82f6;--border:#e5e7eb;--hover:#f3f4f6;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--sidebar-w:240px;--toc-w:180px}
[data-theme="dark"]{--bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#fbbf24;--blue:#60a5fa;--border:#334155;--hover:#1e293b;--shadow-sm:0 1px 2px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .2s,color .2s}
.navbar{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;height:48px;display:flex;align-items:center;gap:.8rem}
.navbar .logo{font-weight:700;font-size:.95rem;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:.3rem}
.navbar input{border:1px solid var(--border);border-radius:6px;padding:.25rem .6rem;font-size:.8rem;background:var(--bg);color:var(--text);width:180px;outline:none;transition:border-color .15s}
.navbar input:focus{border-color:var(--blue)}.navbar input::placeholder{color:var(--muted)}
.navbar nav{display:flex;gap:1rem;margin-left:auto;align-items:center;font-size:.8rem}
.navbar nav a{color:var(--muted);text-decoration:none}.navbar nav a:hover{color:var(--blue)}
.theme-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:.2rem .45rem;cursor:pointer;font-size:.8rem;color:var(--muted);line-height:1}
.theme-btn:hover{background:var(--hover)}
/* Layout */
.layout{display:flex;min-height:calc(100vh - 48px)}
.sidebar{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);padding:.8rem 0;overflow-y:auto;position:sticky;top:48px;height:calc(100vh - 48px);font-size:.82rem}
.sidebar .sec{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:.6rem 1rem .3rem}
.sidebar a{display:flex;align-items:center;gap:.4rem;padding:.3rem 1rem;color:var(--text);text-decoration:none;transition:all .1s;border-left:2px solid transparent}
.sidebar a:hover{background:var(--hover);color:var(--blue)}
.sidebar a.active{background:var(--hover);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.content{flex:1;min-width:0;padding:1.2rem 1.5rem}
.toc{width:var(--toc-w);flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);padding:.8rem 1rem;overflow-y:auto;position:sticky;top:48px;height:calc(100vh - 48px);font-size:.76rem;display:none}
.toc.show{display:block}
.toc-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.6rem}
.toc a{display:block;color:var(--muted);text-decoration:none;padding:.15rem 0;border-left:1px solid transparent;padding-left:.6rem;transition:all .1s}
.toc a:hover,.toc a.active{color:var(--blue);border-left-color:var(--blue)}
.toc a.indent{padding-left:1.2rem;font-size:.72rem}
/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem;transition:all .15s;cursor:pointer;box-shadow:var(--shadow-sm)}
.card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--blue)}
.card-title{font-weight:600;font-size:.84rem;margin-bottom:.2rem;line-height:1.3}
.card-meta{font-size:.68rem;color:var(--muted)}
.card-tags{margin-top:.3rem}
.tag{display:inline-block;padding:.08em .4em;border-radius:3px;font-size:.65rem;background:#eff6ff;color:#2563eb;margin:.08rem}
.tag-click{cursor:pointer}.tag-click:hover{background:#2563eb;color:#fff}
[data-theme="dark"] .tag{background:#1e3a5f;color:#7dd3fc}
[data-theme="dark"] .tag-click:hover{background:#3b82f6;color:#fff}
.tag-click{cursor:pointer}.tag-click:hover{background:#2563eb;color:#fff}
.badge{padding:.08em .35em;border-radius:3px;font-size:.6rem;font-weight:600}
.badge-click{cursor:pointer;transition:all .15s}.badge-click:hover{filter:brightness(.9)}
.b-entity{background:#eff6ff;color:#2563eb}.b-concept{background:#f0fdf4;color:#16a34a}
.b-comparison{background:#fffbeb;color:#d97706}.b-query{background:#faf5ff;color:#9333ea}
[data-theme="dark"] .b-entity{background:#1e3a5f;color:#7dd3fc}[data-theme="dark"] .b-concept{background:#14532d;color:#86efac}
[data-theme="dark"] .b-comparison{background:#3b2e00;color:#fcd34d}[data-theme="dark"] .b-query{background:#3b0764;color:#c084fc}
/* Sub sections */
.sub{margin-bottom:1.5rem}.sub-head{font-size:.82rem;font-weight:600;margin-bottom:.5rem;display:flex;align-items:baseline;gap:.4rem}
.sub-head .cnt{font-size:.7rem;color:var(--muted);font-weight:400;background:var(--border);padding:.05em .5em;border-radius:8px}
/* Reading */
.reading{max-width:680px}.reading h1{font-size:1.4rem;margin-bottom:.8rem;line-height:1.3}
.reading h2{font-size:1.05rem;margin:1.5rem 0 .4rem;padding-bottom:.2rem;border-bottom:1px solid var(--border)}
.reading h3{font-size:.92rem;margin:1rem 0 .2rem}
.reading p{margin:.5rem 0;font-size:.9rem;line-height:1.75}
.reading ul,.reading ol{margin:.4rem 0;padding-left:1.5rem}.reading li{margin:.2rem 0;line-height:1.6}
.reading code{background:var(--hover);padding:.1em .3em;border-radius:3px;font-size:.85em}
.reading pre{background:#1e293b;color:#e2e8f0;padding:.8rem;border-radius:6px;overflow-x:auto;margin:.7rem 0;font-size:.78rem;line-height:1.55}
.reading pre code{background:none;color:inherit;padding:0}
.reading blockquote{border-left:3px solid var(--blue);padding:.2rem .8rem;margin:.6rem 0;color:var(--muted);font-style:italic}
.breadcrumb{font-size:.78rem;color:var(--muted);margin-bottom:1rem}.breadcrumb a{color:var(--blue);text-decoration:none}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}.empty h2{font-size:1rem;color:var(--text);margin-bottom:.3rem}
.s-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-sm);max-height:300px;overflow-y:auto;z-index:30;display:none}
.s-results.show{display:block}
.s-results a{display:block;padding:.5rem .8rem;color:var(--text);text-decoration:none;font-size:.8rem;border-bottom:1px solid var(--border)}
.s-results a:hover{background:var(--hover)}.s-results a .s-title{font-weight:500}.s-results a .s-meta{font-size:.7rem;color:var(--muted)}
.search-wrap{position:relative}
@media(max-width:768px){.sidebar,.toc{display:none!important}.content{padding:.8rem}.card-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="navbar">
  <a href="dashboard.html" class="logo">🌶️ 小米辣</a>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索文档..." oninput="doSearch()" onfocus="doSearch()" onblur="setTimeout(function(){document.getElementById('searchResults').classList.remove('show')},200)">
    <div class="s-results" id="searchResults"></div>
  </div>
  <nav>
    <a href="dashboard.html">仪表盘</a>
    <a href="daily.html">📖 必读</a>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </nav>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sec" style="padding-top:0">📂 导航</div>
    <a href="#" onclick="showList()" id="nav-list">📋 全部文档</a>
  </aside>

  <main class="content" id="content"><div class="empty"><p>加载中...</p></div></main>

  <aside class="toc" id="tocPanel">
    <div class="toc-title">📑 目录</div>
    <div id="tocLinks"></div>
  </aside>
</div>

<script>
// Theme
function initTheme(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙'}
function toggleTheme(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙'}
initTheme();

var allPages=[],subDomains={},currentDomain='',currentView='list';
var DOMS={'it-security':{emoji:'🔐',name:'IT网络与数据安全'},'auto-security':{emoji:'🚗',name:'智能网联汽车安全'},'investment':{emoji:'📈',name:'投资之路'},'daily':{emoji:'📝',name:'日常记录'},'ai-learning':{emoji:'🤖',name:'AI学习'},'other':{emoji:'📦',name:'其他'}};
var TYPES={}
var BADGES={}
var TYPE_COLORS={'制度':'b-entity','方案':'b-concept','报告':'b-comparison','案例':'b-query','标准':'b-entity'}

function esc(s){return s.replace(/'/g,"\\'")}

async function init(){
  var p=new URLSearchParams(location.search);
  currentDomain=p.get('domain')||'';
  var directPage=p.get('page')||'';
  var filterTag=p.get('tag')||'';
  var filterType=p.get("type")||"";
  try{var r1=await fetch('page_list.json');allPages=await r1.json()}catch(e){allPages=[]}
  try{var r2=await fetch('sub_domains.json');var sd=await r2.json();subDomains=sd.sub_domains[currentDomain]||[]}catch(e){}
  buildSidebar();
  if(directPage){viewPage(directPage,directPage.split('/').pop().replace('.md','').replace(/-/g,' '));return}
  if(filterTag){showTagFilter(filterTag,currentDomain);return}
  if(filterType){showTypeFilter(filterType,currentDomain);return}
  showList()
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="sec" style="padding-top:0">📂 导航</div>';
  html+='<a href="#" onclick="showList()" id="nav-list">📋 全部文档</a>';
  
  // Group all pages by domain
  var byDomain={};
  allPages.forEach(function(p){if(!byDomain[p.domain])byDomain[p.domain]=[];byDomain[p.domain].push(p)});
  
  Object.keys(DOMS).forEach(function(dk){
    if(!byDomain[dk]||byDomain[dk].length===0)return;
    var d=DOMS[dk];
    html+='<div class="sec">'+d.emoji+' '+d.name+'</div>';
    
    // Group by sub_domain
    var sdInfo=subDomains;
    var groups={};
    byDomain[dk].forEach(function(p){var sd=p.sub_domain||'other';if(!groups[sd])groups[sd]=[];groups[sd].push(p)});
    
    var order=sdInfo.map(function(s){return s.id});
    if(order.indexOf('other')<0)order.push('other');
    
    order.forEach(function(sdId){
      if(!groups[sdId])return;
      var info=null;sdInfo.forEach(function(s){if(s.id===sdId)info=s});
      var name=info?info.emoji+' '+info.name:sdId;
      html+='<a href="#" onclick="filterBySub(\''+dk+'\',\''+sdId+'\')" style="padding-left:1.5rem;font-size:.78rem">'+name+' <span style="color:var(--muted);font-size:.68rem">'+groups[sdId].length+'</span></a>';
    });
  });
  sb.innerHTML=html;
  // Highlight current
  if(currentDomain){var d=DOMS[currentDomain];document.querySelector('#sidebar .sec').textContent=d.emoji+' '+d.name}
}

function showList(){currentView='list';document.getElementById('tocPanel').classList.remove('show');
  var pages=allPages;if(currentDomain)pages=pages.filter(function(p){return p.domain===currentDomain});
  if(pages.length===0){document.getElementById('content').innerHTML='<div class="empty"><h2>📭 暂无文档</h2><p><a href="dashboard.html" style="color:var(--blue)">← 返回仪表盘</a></p></div>';return}
  
  var groups={};pages.forEach(function(p){var sd=p.sub_domain||'other';if(!groups[sd])groups[sd]=[];groups[sd].push(p)});
  var html='<div class="breadcrumb"><a href="dashboard.html">仪表盘</a> / '+(DOMS[currentDomain]?DOMS[currentDomain].name:'全部文档')+'</div>';
  if(currentDomain)html+='<div style="font-size:.78rem;color:var(--muted);margin-bottom:1rem">共 <strong>'+pages.length+'</strong> 篇，分 <strong>'+Object.keys(groups).length+'</strong> 个板块</div>';

  var order=subDomains.map(function(s){return s.id});if(order.indexOf('other')<0)order.push('other');
  Object.keys(groups).forEach(function(k){if(order.indexOf(k)<0)order.push(k)});
  
  order.forEach(function(sdId){
    if(!groups[sdId])return;
    var info=null;subDomains.forEach(function(s){if(s.id===sdId)info=s});
    var name=info?info.emoji+' '+info.name:sdId;
    html+='<div class="sub"><div class="sub-head">'+name+'<span class="cnt">'+groups[sdId].length+'</span></div>';
    if(info&&info.desc)html+='<div style="font-size:.72rem;color:var(--muted);margin-bottom:.5rem">'+info.desc+'</div>';
    html+='<div class="card-grid">';
    groups[sdId].forEach(function(p){var bc=TYPE_COLORS[p.type]||'b-entity';html+='<div class="card" onclick="viewPage(\''+p.path+'\',\''+esc(p.title)+'\')"><div class="card-title">'+p.title+'</div><div class="card-meta"><span class="badge badge-click '+bc+'">'+p.type+'</span> · '+p.updated+'</div><div class="card-tags">'+(p.tags||[]).slice(0,3).map(function(t){return '<span class="tag">'+t+'</span>'}).join('')+'</div></div>'});
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html
}

function filterBySub(domain,sub){currentDomain=domain;currentView='list';
  var pages=allPages.filter(function(p){return p.domain===domain&&p.sub_domain===sub});
  if(pages.length===0){showList();return}
  document.getElementById('tocPanel').classList.remove('show');
  var d=DOMS[domain];var info=null;subDomains.forEach(function(s){if(s.id===sub)info=s});
  var html='<div class="breadcrumb"><a href="dashboard.html">仪表盘</a> / <a href="#" onclick="showList()">'+d.name+'</a> / '+(info?info.name:sub)+'</div>';
  html+='<div class="card-grid">';
  pages.forEach(function(p){html+='<div class="card" onclick="viewPage(\''+p.path+'\',\''+esc(p.title)+'\')"><div class="card-title">'+p.title+'</div><div class="card-meta"><span class="badge badge-click '+TYPE_COLORS[p.type]+'">'+p.type+'</span> · '+p.updated+'</div><div class="card-tags">'+(p.tags||[]).slice(0,3).map(function(t){return '<span class="tag">'+t+'</span>'}).join('')+'</div></div>'});
  html+='</div>';
  document.getElementById('content').innerHTML=html
}

function showTypeFilter(type,domain){
  currentView="list";currentDomain=domain;
  var pages=allPages.filter(function(p){return p.domain===domain&&p.type===type});
  document.getElementById("tocPanel").classList.remove("show");
  var d=DOMS[domain]||{emoji:"📦",name:domain};
  var html="<div class=\"breadcrumb\"><a href=\"dashboard.html\">仪表盘</a> / "+d.name+" / 📋 "+type+"</div>";
  html+="<div style=\"font-size:.78rem;color:var(--muted);margin-bottom:1rem\">类型筛选：<strong>"+type+"</strong> — 共 <strong>"+pages.length+"</strong> 篇</div>";
  html+="<div class=\"card-grid\">";
  pages.forEach(function(p){html+="<div class=\"card\" onclick=\"viewPage(\+p.path+,\+esc(p.title)+)\"><div class=\"card-title\">"+p.title+"</div><div class=\"card-meta\">"+p.type+" · "+p.updated+"</div></div>"});
  html+="</div>";
  document.getElementById("content").innerHTML=html
}

function showTagFilter(tag,domain){
  currentView='list';currentDomain=domain;
  var pages=allPages.filter(function(p){return p.domain===domain&&p.tags&&p.tags.indexOf(tag)>=0});
  document.getElementById('tocPanel').classList.remove('show');
  var d=DOMS[domain]||{emoji:'📦',name:domain};
  var html='<div class="breadcrumb"><a href="dashboard.html">仪表盘</a> / '+d.name+' / 🏷️ '+tag+'</div>';
  html+='<div style="font-size:.78rem;color:var(--muted);margin-bottom:1rem">标签筛选：<strong>'+tag+'</strong> — 共 <strong>'+pages.length+'</strong> 篇</div>';
  html+='<div class="card-grid">';
  pages.forEach(function(p){html+='<div class="card" onclick="viewPage(\''+p.path+'\',\''+esc(p.title)+'\')"><div class="card-title">'+p.title+'</div><div class="card-meta"><span class="badge badge-click '+TYPE_COLORS[p.type]+'">'+p.type+'</span> · '+p.updated+'</div><div class="card-tags">'+(p.tags||[]).slice(0,3).map(function(t){return '<span class="tag">'+t+'</span>'}).join('')+'</div></div>'});
  html+='</div>';
  document.getElementById('content').innerHTML=html
}

async function viewPage(path,title){currentView='page';
  document.getElementById('content').innerHTML='<div class="empty"><p>加载中...</p></div>';
  try{
    var r=await fetch(path);var md=await r.text();
    md=md.replace(/^---[\s\S]*?---\n*/,'');
    // Build TOC
    var toc=[];
    var lines=md.split('\n');
    var h='';var inPre=false;
    for(var i=0;i<lines.length;i++){
      var l=lines[i].trim();
      if(l.startsWith('```')){inPre=!inPre;continue}
      if(inPre){h+='\n'+l;continue}
      if(l.startsWith('# ')){toc.push({t:l.slice(2),id:'h-'+i,level:1});h+='<h1 id="h-'+i+'">'+l.slice(2)+'</h1>'}
      else if(l.startsWith('## ')){toc.push({t:l.slice(3),id:'h-'+i,level:2});h+='<h2 id="h-'+i+'">'+l.slice(3)+'</h2>'}
      else if(l.startsWith('### ')){toc.push({t:l.slice(4),id:'h-'+i,level:3});h+='<h3 id="h-'+i+'">'+l.slice(4)+'</h3>'}
      else if(l.startsWith('- ')){h+='<li>'+l.slice(2)+'</li>'}
      else if(l.match(/^\d+\. /)){h+='<li>'+l.replace(/^\d+\. /,'')+'</li>'}
      else if(l.startsWith('> ')){h+='<blockquote>'+l.slice(2)+'</blockquote>'}
      else if(l){h+='<p>'+l+'</p>'}
    }
    h=h.replace(/((?:<li>[^<]*<\/li>\s*)+)/g,'<ul>$1</ul>');
    // Render TOC
    var tc='';
    toc.forEach(function(e){tc+='<a href="#'+e.id+'" class="'+(e.level>1?'indent':'')+'">'+e.t+'</a>'});
    document.getElementById('tocLinks').innerHTML=tc;
    document.getElementById('tocPanel').classList.add('show');
    document.getElementById('content').innerHTML='<div class="reading">'+h+'</div>'
  }catch(e){document.getElementById('content').innerHTML='<div class="empty"><p>加载失败</p></div>'}
}

// Search
function doSearch(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  var box=document.getElementById('searchResults');
  if(!q){box.classList.remove('show');return}
  var matches=allPages.filter(function(p){return p.title.toLowerCase().indexOf(q)>=0||(p.tags||[]).some(function(t){return t.indexOf(q)>=0})}).slice(0,8);
  if(matches.length===0){box.innerHTML='<div style="padding:.5rem .8rem;font-size:.78rem;color:var(--muted)">无匹配结果</div>';box.classList.add('show');return}
  var h='';
  matches.forEach(function(p){h+='<a href="#" onclick="viewPage(\''+p.path+'\',\''+esc(p.title)+'\');document.getElementById(\'searchResults\').classList.remove(\'show\');document.getElementById(\'searchInput\').value=\'\'"><div class="s-title">'+p.title+'</div><div class="s-meta">'+p.type+' · '+p.updated+'</div></a>'});
  box.innerHTML=h;box.classList.add('show')
}

init();
document.addEventListener("click",function(e){if(e.target.classList.contains("tag-click")){e.stopPropagation();e.preventDefault();var t=e.target.textContent.trim().split(" ")[0];var domain=new URLSearchParams(location.search).get("domain")||"";location.href="index.html?domain="+domain+"\&tag="+encodeURIComponent(t)}});
document.addEventListener("click",function(e){if(e.target.classList.contains("badge-click")){e.stopPropagation();e.preventDefault();var type=e.target.textContent.trim();var d=new URLSearchParams(location.search).get("domain")||"";location.href="index.html?domain="+d+"\&type="+encodeURIComponent(type)}});
</script>
</body>
</html>
